<!DOCTYPE html>

<body>

<script>

const vets = [
  {
    name: "Eastern Maine Emergency Vet (Holden)",
    lat: 44.7446,
    lng: -68.6788,
    phone: "(207) 989-6267",
    hours: {
      mon: [[0,24]],
      tue: [[17.5,24],[0,8]],
      wed: [[17.5,24],[0,8]],
      thu: [[17.5,24],[0,8]],
      fri: [[17.5,24],[0,8]],
      sat: [[0,24]],
      sun: [[0,24]]
    }
  }
];


// =====================
// LOGIC
// =====================

function isOpenNow(hours) {
  const now = new Date();
  const day = ["sun","mon","tue","wed","thu","fri","sat"][now.getDay()];
  const current = now.getHours() + now.getMinutes()/60;

  const ranges = hours[day] || [];

  for (const [open, close] of ranges) {
    if (open < close) {
      if (current >= open && current < close) return true;
    } else {
      if (current >= open || current < close) return true;
    }
  }

  return false;
}


// =====================
// DISPLAY
// =====================

const map = L.map('map').setView([44.5, -69.5], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

function search() {

}

</script>
